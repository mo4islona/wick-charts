<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowCharts Demo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0e17; }
      /* Prism token colors */
      .token.keyword { color: #c678dd; }
      .token.string, .token.template-string { color: #98c379; }
      .token.function { color: #61afef; }
      .token.number { color: #d19a66; }
      .token.operator, .token.punctuation { opacity: 0.7; }
      .token.comment { opacity: 0.4; font-style: italic; }
      .token.property { color: #e5c07b; }
      .token.builtin { color: #56b6c2; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
